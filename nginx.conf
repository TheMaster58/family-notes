server {
    listen 80;
    server_name _; # Adjust if you have a specific domain or Tailscale magicDNS

    location / {
        root /var/www/family-notes/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /notes {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Tailscale Header Identification
        proxy_set_header Tailscale-User-Name $http_tailscale_user_name;
    }
}
